syntax = "proto3";

package packet;

option csharp_namespace = "RTW.NetworkDefinition.Proto.Packet"; // 수정됨: C# 네임스페이스 변경

// 패킷 ID Enum (PacketHeader의 id 필드에 사용)
enum PacketId {
  PacketIdNone = 0; // 기본값

  // 시스템 및 연결
  C_AUTH_TOKEN = 1;
  S_AUTH_RESULT = 2;

  // Echo (Test)
  ECHO_MESSAGE = 9999; // C_ECHO_PACKET and S_ECHO_PACKET merged

  // Social
  C_CHAT = 10001;
  S_CHAT = 10002;
  C_CHAT_JOIN = 10003;
  S_CHAT_JOIN_RESULT = 10004;
  C_CHAT_LEAVE = 10005;
  S_CHAT_LEAVE_RESULT = 10006;
  C_CHAT_CHAT = 10007;

  // Internal
  I_SESSION_CLOSED = 90001;
}

// --- 시스템 및 연결 ---
// (CAuthToken은 PacketHeader 뒤에 오는 payload가 됩니다)
message CAuthToken {
  string authToken = 1;
  int64 userId = 2; // 웹 서버 세션(session_{userId})을 조회하기 위한 키. 토큰이 일치해야 통과하므로 위조 불가.
}

// (SAuthResult는 PacketHeader 뒤에 오는 payload가 됩니다)
message SAuthResult {
  int32 errorCode = 1; // 수정됨: rtw.common.RTWErrorCode
  int64 playerId = 2; // 인증 성공 시 발급되는 플레이어 ID (= 계정 UserId)
}

// --- Echo (Test) ---
// (EchoMessage는 PacketHeader 뒤에 오는 payload가 됩니다)
message EchoMessage {
    string message = 1;
}

// --- Social ---
message CChat {
  uint32 chatType = 1;
  string message = 2;
  string targetName = 3;
}

message CChatChat {
  string message = 1;
}

message SChat {
  uint32 chatType = 1;
  int64 senderPlayerId = 2; // 발신자 플레이어 ID (= 계정 UserId)
  string senderName = 3;
  string message = 4;
}

// (CChatJoin는 PacketHeader 뒤에 오는 payload가 됩니다)
message CChatJoin {
  string roomId = 1;
}

// (SChatJoinResult는 PacketHeader 뒤에 오는 payload가 됩니다)
message SChatJoinResult {
  int32 errorCode = 1;
  string roomId = 2;
}

// (CChatLeave는 PacketHeader 뒤에 오는 payload가 됩니다)
message CChatLeave {
  string roomId = 1;
}

// (SChatLeaveResult는 PacketHeader 뒤에 오는 payload가 됩니다)
message SChatLeaveResult {
  int32 errorCode = 1;
  string roomId = 2;
}

message ISessionClosed {
}
